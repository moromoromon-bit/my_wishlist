<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 위시리스트</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --line:#e3e6ea; --text:#1f2328;
    --sub:#6b7280; --accent:#5b6cff; --accent-2:#2bb673; --danger:#ef4444;
    --chip:#e7e9ee; --memo-bg:#f7f8fa; --review-bg:#eafaf1; --review-text:#1d7a4d;
  }
  html[data-theme="dark"]{
    --bg:#15171c; --card:#1f232b; --line:#333a44; --text:#e6e8eb;
    --sub:#9aa3af; --accent:#7c8aff; --accent-2:#34c98a; --danger:#f87171;
    --chip:#2a2f38; --memo-bg:#272c34; --review-bg:#1c3a2c; --review-text:#7fe0ad;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--text); padding:24px; transition:background .2s,color .2s;
  }
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
  h1{margin:0 0 4px; font-size:24px;}
  .desc{color:var(--sub); font-size:13px; margin-bottom:16px;}
  .top-actions{display:flex; gap:8px; flex-wrap:wrap;}
  .icon-btn{padding:8px 12px; border:1px solid var(--line); background:var(--card); color:var(--text); border-radius:9px; cursor:pointer; font-size:13px; font-weight:600;}
  .tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .tab{padding:10px 18px; border:none; border-radius:10px; cursor:pointer; background:var(--chip); font-size:15px; font-weight:600; color:var(--sub);}
  .tab.active{background:var(--accent); color:#fff;}
  .summary{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 16px; font-size:13px; color:var(--sub);}
  .stat b{display:block; font-size:18px; color:var(--text); margin-top:2px;}
  .add-box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:20px; display:flex; flex-direction:column; gap:10px;}
  .add-box input, .add-box textarea, .add-box select{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; background:var(--bg); color:var(--text);}
  textarea{resize:vertical; min-height:48px;}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .row>*{flex:1; min-width:140px;}
  button.act{padding:10px 16px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; color:#fff; background:var(--accent);}
  button.ghost{background:var(--chip); color:var(--text);}
  .hint{font-size:12px; color:var(--sub);}
  .label{font-size:12px; font-weight:700; color:var(--sub); margin-top:4px;}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .toolbar input, .toolbar select{padding:9px 12px; border:1px solid var(--line); border-radius:9px; font-size:13px; background:var(--card); color:var(--text);}
  .toolbar input{flex:1; min-width:160px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:16px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; position:relative;}
  .pri-flag{position:absolute; top:8px; left:8px; background:rgba(0,0,0,.6); color:#fff; font-size:11px; padding:3px 8px; border-radius:20px;}
  .thumb{width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--chip); display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:13px;}
  .card-body{padding:12px; display:flex; flex-direction:column; gap:8px;}
  .card-title{font-size:15px; font-weight:700; line-height:1.3; word-break:break-all;}
  .price{font-size:15px; font-weight:800; color:var(--accent);}
  .tags{display:flex; gap:5px; flex-wrap:wrap;}
  .tag{font-size:11px; background:var(--chip); color:var(--sub); padding:2px 8px; border-radius:20px;}
  .card-link{font-size:12px; color:var(--accent); text-decoration:none; word-break:break-all;}
  .dates{font-size:11px; color:var(--sub);}
  .memo{font-size:13px; color:var(--sub); background:var(--memo-bg); padding:8px; border-radius:8px; white-space:pre-wrap; word-break:break-all;}
  .memo.review{background:var(--review-bg); color:var(--review-text);}
  .stars{color:#f5b301; font-size:14px; letter-spacing:1px;}
  .btns{display:flex; gap:6px; flex-wrap:wrap;}
  .btns button{flex:1; padding:8px; font-size:13px; border:none; border-radius:7px; cursor:pointer; font-weight:600;}
  .empty{color:var(--sub); text-align:center; padding:40px; font-size:15px; grid-column:1/-1;}
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>🛍️ 나의 위시리스트</h1>
      <div class="desc">사고 싶은 물건을 모아두고, 구매하면 후기까지 남겨보세요.</div>
    </div>
    <div class="top-actions">
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙 다크모드</button>
      <button class="icon-btn" onclick="exportData()">📤 백업</button>
      <button class="icon-btn" onclick="document.getElementById('importFile').click()">📥 복원</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-wish" onclick="switchTab('wish')">위시리스트</button>
    <button class="tab" id="tab-bought" onclick="switchTab('bought')">구매함</button>
  </div>

  <div class="summary" id="summary"></div>

  <div class="add-box" id="addBox">
    <div class="label">상품 링크</div>
    <div class="row">
      <input id="inLink" placeholder="링크 붙여넣기 (예: https://...)">
      <button class="act ghost" onclick="autoFetch()" id="fetchBtn" style="flex:0 0 auto">🔍 자동 불러오기</button>
    </div>
    <div class="hint">자동이 안 되면 아래 항목을 직접 입력하세요. (이미지 우클릭 → \"이미지 주소 복사\")</div>
    <div class="row">
      <input id="inName" placeholder="상품 이름">
      <input id="inImg" placeholder="이미지 주소 (선택)">
    </div>
    <div class="row">
      <input id="inPrice" type="number" placeholder="가격 (숫자만)">
      <input id="inTags" placeholder="카테고리/태그 (쉼표로 구분: 옷, 전자기기)">
      <select id="inPriority">
        <option value="3">우선순위: 보통</option>
        <option value="1">🔥 꼭 사고싶음</option>
        <option value="2">⬆️ 높음</option>
        <option value="4">⬇️ 낮음</option>
      </select>
    </div>
    <div class="label">왜 사고 싶은지 메모 (선택)</div>
    <textarea id="inMemo" placeholder="예) 겨울에 따뜻할 것 같아서, 세일 중이라..."></textarea>
    <div class="row">
      <button class="act" onclick="addItem()" id="submitBtn">＋ 위시리스트에 추가</button>
      <button class="act ghost" onclick="clearForm()" style="flex:0 0 auto">입력 초기화</button>
    </div>
  </div>

  <div class="toolbar">
    <input id="searchBox" placeholder="🔍 이름·메모·태그 검색" oninput="render()">
    <select id="filterTag" onchange="render()"><option value="">전체 카테고리</option></select>
    <select id="sortBy" onchange="render()">
      <option value="newest">최신순</option>
      <option value="oldest">오래된순</option>
      <option value="priority">우선순위순</option>
      <option value="price_high">가격 높은순</option>
      <option value="price_low">가격 낮은순</option>
      <option value="name">이름순</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

<script>
  let items = JSON.parse(localStorage.getItem('wishlist_items') || '[]');
  let currentTab = 'wish';
  let editingId = null;
  const PRI = {1:'🔥 꼭 사고싶음',2:'⬆️ 높음',3:'보통',4:'⬇️ 낮음'};

  // 테마
  if(localStorage.getItem('wishlist_theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); }
  function toggleTheme(){
    const dark = document.documentElement.getAttribute('data-theme')==='dark';
    if(dark){ document.documentElement.removeAttribute('data-theme'); localStorage.setItem('wishlist_theme','light'); }
    else { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('wishlist_theme','dark'); }
    updateThemeBtn();
  }
  function updateThemeBtn(){
    const dark = document.documentElement.getAttribute('data-theme')==='dark';
    document.getElementById('themeBtn').textContent = dark ? '☀️ 라이트모드' : '🌙 다크모드';
  }

  function save(){ localStorage.setItem('wishlist_items', JSON.stringify(items)); }
  function fmt(n){ return n ? Number(n).toLocaleString('ko-KR')+'원' : ''; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function esc(s){ return (s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c])); }

  function switchTab(tab){
    currentTab = tab;
    document.getElementById('tab-wish').classList.toggle('active', tab==='wish');
    document.getElementById('tab-bought').classList.toggle('active', tab==='bought');
    document.getElementById('addBox').style.display = (tab==='wish') ? 'flex' : 'none';
    render();
  }

  function clearForm(){
    editingId = null;
    inLink.value=''; inName.value=''; inImg.value=''; inMemo.value='';
    inPrice.value=''; inTags.value=''; inPriority.value='3';
    document.getElementById('submitBtn').textContent = '＋ 위시리스트에 추가';
  }

  function parseTags(s){ return (s||'').split(',').map(t=>t.trim()).filter(Boolean); }

  function addItem(){
    const name = inName.value.trim();
    const link = inLink.value.trim();
    if(!name && !link){ alert('이름이나 링크 중 하나는 입력해주세요.'); return; }
    if(editingId){
      const it = items.find(i=>i.id===editingId);
      it.name=name; it.link=link; it.img=inImg.value.trim(); it.memo=inMemo.value.trim();
      it.price=inPrice.value; it.tags=parseTags(inTags.value); it.priority=Number(inPriority.value);
      editingId=null;
    } else {
      items.unshift({
        id: Date.now(), name, link, img: inImg.value.trim(), memo: inMemo.value.trim(),
        price: inPrice.value, tags: parseTags(inTags.value), priority: Number(inPriority.value),
        bought:false, review:'', rating:0, addedDate: today(), boughtDate:''
      });
    }
    save(); clearForm(); refreshTagFilter(); render();
  }

  function editItem(id){
    const it = items.find(i=>i.id===id);
    editingId=id; switchTab('wish');
    inName.value=it.name; inLink.value=it.link; inImg.value=it.img||''; inMemo.value=it.memo||'';
    inPrice.value=it.price||''; inTags.value=(it.tags||[]).join(', '); inPriority.value=it.priority||3;
    document.getElementById('submitBtn').textContent = '✓ 수정 완료';
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function markBought(id){
    const it = items.find(i=>i.id===id);
    it.bought=true; it.boughtDate=today();
    const r = prompt('축하해요! 간단한 후기를 남겨볼까요? (나중에 수정 가능)','');
    if(r!==null) it.review=r;
    const s = prompt('별점은 몇 점인가요? (1~5, 건너뛰려면 비워두세요)','');
    if(s){ const n=Math.max(1,Math.min(5,parseInt(s)||0)); it.rating=n; }
    save(); render();
  }

  function moveBack(id){ const it=items.find(i=>i.id===id); it.bought=false; it.boughtDate=''; save(); render(); }

  function editReview(id){
    const it = items.find(i=>i.id===id);
    const r = prompt('후기 수정', it.review||'');
    if(r!==null){ it.review=r;
      const s = prompt('별점 (1~5)', it.rating||'');
      if(s!==null && s!==''){ it.rating=Math.max(1,Math.min(5,parseInt(s)||0)); }
      save(); render();
    }
  }

  function delItem(id){ if(confirm('정말 삭제할까요?')){ items=items.filter(i=>i.id!==id); save(); refreshTagFilter(); render(); } }

  function stars(n){ n=n||0; return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n); }

  function exportData(){
    const blob = new Blob([JSON.stringify(items,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'wishlist-backup-'+today()+'.json';
    a.click();
  }
  function importData(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const data = JSON.parse(reader.result);
        if(!Array.isArray(data)) throw new Error();
        if(confirm('현재 데이터를 덮어쓸까요? (취소하면 기존 목록에 합칩니다)')){ items = data; }
        else { const ids=new Set(items.map(i=>i.id)); items=items.concat(data.filter(d=>!ids.has(d.id))); }
        save(); refreshTagFilter(); render();
        alert('복원 완료!');
      }catch(err){ alert('올바른 백업 파일이 아니에요.'); }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  async function autoFetch(){
    const url = inLink.value.trim();
    if(!url){ alert('먼저 링크를 붙여넣어 주세요.'); return; }
    const btn = document.getElementById('fetchBtn');
    btn.textContent='불러오는 중...'; btn.disabled=true;
    const proxies = [
      u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`
    ];
    let html=null;
    for(const p of proxies){
      try{ const res=await fetch(p(url)); if(res.ok){ html=await res.text(); if(html) break; } }catch(e){}
    }
    btn.textContent='🔍 자동 불러오기'; btn.disabled=false;
    if(!html){ alert('자동 불러오기에 실패했어요. 직접 입력해주세요.'); return; }
    const get = (prop)=>{
      const m = html.match(new RegExp('<meta[^>]+(?:property|name)=[\"\']'+prop+'[\"\'][^>]+content=[\"\']([^\"\']+)[\"\']','i'))
             || html.match(new RegExp('<meta[^>]+content=[\"\']([^\"\']+)[\"\'][^>]+(?:property|name)=[\"\']'+prop+'[\"\']','i'));
      return m ? m[1] : '';
    };
    const ogImg = get('og:image');
    let title = get('og:title');
    if(!title){ const t=html.match(/<title[^>]*>([^<]+)<\/title>/i); title=t?t[1].trim():''; }
    if(title && !inName.value) inName.value = title;
    if(ogImg && !inImg.value) inImg.value = ogImg;
    if(!ogImg && !title) alert('정보를 찾지 못했어요. 직접 입력해주세요.');
  }

  function refreshTagFilter(){
    const sel = document.getElementById('filterTag');
    const cur = sel.value;
    const all = [...new Set(items.flatMap(i=>i.tags||[]))].sort();
    sel.innerHTML = '<option value="">전체 카테고리</option>' + all.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('');
    sel.value = cur;
  }

  function renderSummary(){
    const wish = items.filter(i=>!i.bought);
    const bought = items.filter(i=>i.bought);
    const wishSum = wish.reduce((a,i)=>a+(Number(i.price)||0),0);
    const boughtSum = bought.reduce((a,i)=>a+(Number(i.price)||0),0);
    document.getElementById('summary').innerHTML = `
      <div class="stat">위시리스트<b>${wish.length}개</b></div>
      <div class="stat">위시 합계<b>${fmt(wishSum)||'0원'}</b></div>
      <div class="stat">구매함<b>${bought.length}개</b></div>
      <div class="stat">구매 합계<b>${fmt(boughtSum)||'0원'}</b></div>`;
  }

  function render(){
    renderSummary();
    const grid = document.getElementById('grid');
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    const ftag = document.getElementById('filterTag').value;
    const sort = document.getElementById('sortBy').value;
    let list = items.filter(i => currentTab==='wish' ? !i.bought : i.bought);
    if(q) list = list.filter(i => (i.name||'').toLowerCase().includes(q) || (i.memo||'').toLowerCase().includes(q) || (i.tags||[]).join(' ').toLowerCase().includes(q));
    if(ftag) list = list.filter(i => (i.tags||[]).includes(ftag));
    list.sort((a,b)=>{
      switch(sort){
        case 'oldest': return a.id-b.id;
        case 'priority': return (a.priority||3)-(b.priority||3) || b.id-a.id;
        case 'price_high': return (Number(b.price)||0)-(Number(a.price)||0);
        case 'price_low': return (Number(a.price)||0)-(Number(b.price)||0);
        case 'name': return (a.name||'').localeCompare(b.name||'');
        default: return b.id-a.id;
      }
    });
    if(list.length===0){
      grid.innerHTML = `<div class="empty">${currentTab==='wish'?'표시할 항목이 없어요. 위에서 추가해보세요!':'아직 구매한 물건이 없어요.'}</div>`;
      return;
    }
    grid.innerHTML = list.map(it=>{
      const thumb = it.img
        ? `<img class="thumb" src="${esc(it.img)}" onerror="this.outerHTML='<div class=&quot;thumb&quot;>이미지 없음</div>'">`
        : `<div class="thumb">이미지 없음</div>`;
      const flag = (it.priority && it.priority!==3 && currentTab==='wish') ? `<div class="pri-flag">${PRI[it.priority]}</div>` : '';
      const price = it.price ? `<div class="price">${fmt(it.price)}</div>` : '';
      const tags = (it.tags&&it.tags.length) ? `<div class="tags">${it.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>` : '';
      const linkLine = it.link ? `<a class="card-link" href="${esc(it.link)}" target="_blank">🔗 링크 열기</a>` : '';
      const memo = it.memo ? `<div class="memo">📝 ${esc(it.memo)}</div>` : '';
      let actions, extra='';
      if(currentTab==='wish'){
        const d = it.addedDate ? `<div class="dates">📅 추가: ${it.addedDate}</div>` : '';
        extra = memo + d;
        actions = `<div class="btns">
            <button style="background:var(--chip);color:var(--text)" onclick="editItem(${it.id})">✏️ 수정</button>
            <button style="background:var(--accent-2);color:#fff" onclick="markBought(${it.id})">🛒 구매함</button>
            <button style="background:var(--danger);color:#fff" onclick="delItem(${it.id})">🗑️</button>
          </div>`;
      } else {
        const ratingLine = it.rating ? `<div class="stars">${stars(it.rating)}</div>` : '';
        const review = it.review ? `<div class="memo review">⭐ 후기: ${esc(it.review)}</div>` : `<div class="memo">후기가 아직 없어요.</div>`;
        const d = it.boughtDate ? `<div class="dates">🛍️ 구매: ${it.boughtDate}</div>` : '';
        extra = ratingLine + review + d;
        actions = `<div class="btns">
            <button style="background:var(--chip);color:var(--text)" onclick="editReview(${it.id})">✏️ 후기</button>
            <button style="background:var(--chip);color:var(--text)" onclick="moveBack(${it.id})">↩️ 되돌리기</button>
            <button style="background:var(--danger);color:#fff" onclick="delItem(${it.id})">🗑️</button>
          </div>`;
      }
      return `<div class="card">${flag}${thumb}<div class="card-body">
        <div class="card-title">${esc(it.name)||'(이름 없음)'}</div>
        ${price}${tags}${linkLine}${extra}${actions}
      </div></div>`;
    }).join('');
  }

  updateThemeBtn();
  refreshTagFilter();
  render();
</script>
</body>
</html>
